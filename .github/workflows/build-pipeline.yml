name: CI

on:
  push:
    branches:
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MyRecipeBook

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MyRecipeBook.slnx

      - name: Build
        run: dotnet build MyRecipeBook.slnx --no-restore

      - name: Test
        run: dotnet test MyRecipeBook.slnx --no-build

